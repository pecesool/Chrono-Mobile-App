name: chrono_app
description: AI-powered calendar for students
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI Components
  flutter_slidable: ^3.1.1
  table_calendar: ^3.1.2
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10

  # Voice Input
  speech_to_text: ^7.0.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2

  # Platform
  flutter_local_notifications: ^17.2.3
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

  # Animations
  lottie: ^3.1.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
